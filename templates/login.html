<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
    }
  </script>
  <div class="auth-shell">
    <div class="glass-card auth-card">
      <div class="brand">
        <div class="brand-icon">🌐</div>
        <h1>AI Language Translator</h1>
        <p>Secure admin access to your translation workspace.</p>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="flash-stack">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}
      <form method="post" action="{{ url_for('login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required placeholder="admin" />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required placeholder="Admin@123" />
        <button type="submit" class="primary-btn">Login</button>
      </form>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
